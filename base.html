<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RottenMusic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/stars.js" defer></script>
    <link rel="icon" href= "/static/images/favicon.ico">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-black px-3">
 <a href="/" class="ms-2 text-warning fw-bold text-decoration-none">RottenMusic</a> 
</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/search">Recherche</a></li>
            <li class="nav-item"><a class="nav-link" href="/top-artists">Top Artistes</a></li>
            <li class="nav-item"><a class="nav-link" href="/top-albums">Top Albums</a></li>
        </ul>

        <ul class="navbar-nav ms-auto">
            {% if session.username %}
                <li class="nav-item">
                    <span class="nav-link">👤 {{ session.username }}</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Déconnexion</a>
                </li>
            {% else %}
                <li class="nav-item"><a class="nav-link" href="/login">Connexion</a></li>
                <li class="nav-item"><a class="nav-link" href="/register">Inscription</a></li>
            {% endif %}
        </ul>
    </div>
</nav>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
