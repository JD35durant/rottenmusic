{% extends "base.html" %}
{% block content %}

<h2 class="text-warning mb-4">Inscription</h2>

<form method="POST" class="bg-secondary p-4 rounded col-md-5 mx-auto">
    <input class="form-control mb-3" type="text" name="username" placeholder="Nom d'utilisateur" required>
    <input class="form-control mb-3" type="email" name="email" placeholder="Email" required>
    <input class="form-control mb-3" type="password" name="password" placeholder="Mot de passe" required>
    <button class="btn btn-warning w-100">Créer le compte</button>
</form>

{% endblock %}
